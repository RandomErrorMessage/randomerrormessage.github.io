	<style>
		* {
			box-sizing: border-box;
		}
		body {
			background: linear-gradient(145deg, #0b0f11 0%, #141e0d 100%);
			min-height: 100vh;
			margin: 0;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 0.5rem;
			font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
		}
		.card {
			background: rgb(28, 37, 41);
			border-radius: 2rem;
			box-shadow: 0 25px 40px -10px #08222b, inset 0 0 0 1px #f0e0c0;
			padding: 0.5rem 0.5rem;
			text-align: center;
			max-width: min(calc(100vw - 1rem), 40rem);
			min-width: min(calc(100vw - 1rem), 40rem);
			min-height: 100vh;
		}
		summary {
			color: #fbeab3;
			font-size: 1.5rem;
			font-weight: 550;
			text-shadow: 0 0 0.25rem #ffcf8a, 0.1rem 0.1rem 0 #5f492e;
		}
		.diceBtn {
			background: #fcf5e6;
			box-shadow: 0 5px 0 #6b5a48, 0 8px 15px -8px #1d3f47;
			font-size: 1.4rem;
			font-weight: 600;
			padding: 0.7rem;
			border-radius: 50px;
			color: #2d2216;
			cursor: pointer;
			transition: all 0.08s linear;
			line-height: 1;
			border: 1px solid #dcc29e;
			transform: translateY(0);
			margin: 0.25rem;
		}
		.diceBtn:hover {
			background: #ffffff;
			box-shadow: 0 3px 0 #5f4f3c, 0 12px 18px -10px #123038;
			transform: translateY(2px);
		}
		.diceBtn:active {
			transform: translateY(5px);
			box-shadow: 0 0 0 #5f4f3c, 0 12px 18px -10px #0e2a31;
			background: #f2e2ce;
		}
		.customWrapper {
			display: inline-flex;
			align-items: center;
			gap: 0.3rem;
			background: transparent;
		}
		.customRemove {
			background: #ac3e3e;
			border: none;
			color: white;
			font-weight: bold;
			font-size: 1.2rem;
			width: 2rem;
			height: 2rem;
			border-radius: 50%;
			display: inline-flex;
			align-items: center;
			justify-content: center;
			cursor: pointer;
			box-shadow: 0 3px 0 #612828;
			transition: 0.05s linear;
			border: 1px solid #d18a8a;
			transform: translateY(0);
		}
		.customRemove:hover {
			background: #bc4f4f;
			box-shadow: 0 2px 0 #612828;
			transform: translateY(1px);
		}
		.customRemove:active {
			transform: translateY(3px);
			box-shadow: none;
		}
		#sndSpan {
			display: flex;
			align-items: center;
			justify-content: center;
		}
		.customPanel {
			background: #beb7a2a0;
			border-radius: 0.5rem;
			padding: 0.25rem;
			margin: 1rem 0rem 0rem;
			display: flex;
			flex-wrap: wrap;
			align-items: center;
			justify-content: center;
			gap: 0.1rem 0.1rem;
			border: 1px solid #ddd0b5;
		}
		.customPanel input {
			width: 4rem;
			padding: 0.5rem;
			border-radius: 0.5rem;
			border: 1px solid #a48f72;
			background: #fffef7;
			text-align: center;
			font-weight: 600;
			font-size: 1.1rem;
		}
		#diceName {
			width: 100%;
		}
		.addBtn {
			background: #3d7078;
			border: none;
			color: white;
			font-weight: bold;
			padding: 0.5rem 0.8rem;
			border-radius: 40px;
			font-size: 1.1rem;
			cursor: pointer;
			box-shadow: 0 4px 0 #1d4045;
			transition: 0.05s linear;
			border: 1px solid #8fc5cf;
		}
		.addBtn:active {
			transform: translateY(4px);
			box-shadow: none;
		}

		.resultBox {
			background-image: radial-gradient(circle at 30% 20%, #2f6868, #0f3138);
			border-radius: 1rem;
			padding: 0.5rem;
			margin: 0.5rem 0;
			border: 3px solid #dbb48b;
			box-shadow: inset 0 0 15px #0d2429, 0 12px 18px -8px #18353b;
		}
		#diceDisplay {
			align-items: center;
			font-size: 2.5rem;
			font-weight: 600;
			color: #fbeab3;
			text-shadow: 0 0 0.25rem #ffcf8a, 0.1rem 0.1rem 0 #5f492e;
			display: flex;
			flex-wrap: wrap;
			justify-content: center;
		}
		.dieChip {
			background: #fcf3e1;
			color: #281e0f;
			border-radius: 80px;
			font-size: 2.5rem;
			font-weight: 600;

			border: 1px solid #e6c394;
			line-height: 1.4;
			min-width: 3.5rem;
			text-align: center;
			margin: 0.25rem;
		}
		#totalDisplay {
			margin-top: 0.5rem;
			font-size: 1.5rem;
			font-weight: 600;
			color: #ffecb3;
			background: #1f4a4a;
			display: inline-block;
			padding: 0.3rem 0.5rem;
			border-radius: 1rem;
			border: 2px solid #dbb48b;
			box-shadow: inset 0 2px 5px #0c2f2f;
		}
		.historyHeader {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin: 0.5rem 0 1rem;
		}
		.historyHeader h2 {
			margin: 0;
			font-size: 1.6rem;
			color: #d6c29b;
			text-shadow: 2px 2px 0 #2f5a5a;
			font-weight: 500;
		}
		.clear-history {
			background: #7a6a53;
			border: none;
			color: #ffeecd;
			padding: 0.35rem 1.5rem;
			border-radius: 50px;
			font-weight: 600;
			cursor: pointer;
			box-shadow: 0 3px 0 #4f4232;
			transition: 0.05s linear;
			font-size: 1rem;
		}
		.clear-history:active {
			transform: translateY(3px);
			box-shadow: none;
		}
		#historyList {
			background: #322f28d0;
			border-radius: 0.5rem;
			max-height: 200px;
			overflow-y: auto;
			text-align: left;
			color: #eddbbd;
			font-size: 1rem;
			border: 2px solid #b7a27b;
			scroll-behavior: smooth;
		}
		.smallResult {
			font-size: 1rem;
			text-align: start;
		}
		.logEntry {
			font-family: monospace;
		}
		.tarot_or {
			font-size: 1.5rem;
			padding: 0 0.25rem;
		}
		.panel { display: none; }
		.panel.active {
			align-items: center;
			display: flex;
			flex-wrap: wrap;
			justify-content: center;
		}
		button.active {
			background-color: #333;
			color: white;
		}
		.flex {
			align-items: center;
			display: flex;
			flex-wrap: wrap;
			justify-content: center;
		}
		.switch {
			position: relative;
			display: inline-block;
			width: 60px;
			height: 34px;
		}
		.switch input {
			opacity: 0;
			width: 0;
			height: 0;
		}
		.slider {
			position: absolute;
			cursor: pointer;
			top: 0;
			left: 0;
			right: 0;
			bottom: 0;
			background-color: #ccc;
			-webkit-transition: .4s;
			transition: .4s;
			border-radius: 34px;
		}
		.slider:before {
			position: absolute;
			content: "";
			height: 26px;
			width: 26px;
			left: 4px;
			bottom: 4px;
			background-color: white;
			-webkit-transition: .4s;
			transition: .4s;
			border-radius: 50%;
		}
		input:checked + .slider {
			background-color: #2196F3;
		}
		input:focus + .slider {
			box-shadow: 0 0 1px #2196F3;
		}
		input:checked + .slider:before {
			transform: translateX(26px);
		}
	</style>

			const masterAudio = new Audio(mp3b64);
			masterAudio.preload = 'auto';

			const display = document.getElementById('diceDisplay');
			const totalDisplay = document.getElementById('totalDisplay');
			const historyList = document.getElementById('historyList');
			const diceNameInput = document.getElementById('diceName');
			const diceCountInput = document.getElementById('diceCount');
			const diceSidesInput = document.getElementById('diceSides');
			const diceModInput = document.getElementById('diceMod');
			const dicePanel = document.getElementById('dicePanel');
			const sndToggle = document.getElementById('sndToggle');
			const oracleCard = document.getElementById('oracleCard');

			function setCookie(cookie) {
				document.cookie = `data=${encodeURIComponent(JSON.stringify(cookie))}; path=/`;
			}
			function getCookie() {
				const defaultCookie = { snd: false };
				const cookies = document.cookie.split('; ');
				const foundCookie = cookies.find(row => row.startsWith('data='));
				if (!foundCookie) {
					setCookie(defaultCookie);
					return defaultCookie;
				}
				const rawValue = foundCookie.split('=')[1];
				try {
					return JSON.parse(decodeURIComponent(rawValue));
				} catch (e) {
					console.error("Error parsing cookie JSON", e);
					setCookie(defaultCookie);
					return defaultCookie;
				}
			}

			let cookie = getCookie();
			sndToggle.checked = cookie.snd;
			let playSnd = cookie.snd;

			function playSound() {
				if (!playSnd)
					return;
				try {
					const sound = masterAudio.cloneNode(true);

				const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

			function decimalToD66(decimal) {
				if (decimal < 1 || decimal > 36) {
					throw new Error("Input must be between 1 and 36");
				}
				let zeroIndex = decimal - 1;
				let tens = Math.floor(zeroIndex / 6);
				let units = zeroIndex % 6;
				return `${tens + 1}${units + 1}`;
			}
			function d66ToDecimal(d66) {
				const str = String(d66);
				if (str.length !== 2) {
					throw new Error("d66 input must be exactly 2 digits");
				}
				const tens = parseInt(str[0], 10);
				const units = parseInt(str[1], 10);
				if (tens < 1 || tens > 6 || units < 1 || units > 6) {
					throw new Error("d66 digits must be between 1 and 6");
				}
				return ((tens - 1) * 6) + units;
			}
			function runRoll(count, sides, mod=0, name) {
				let sum = 0;
				let html = '';
				let resultStr = '';
				for (let i = 0; i < count; i++) {
					const roll = Math.floor(Math.random() * sides) + 1;
					sum += roll;
					html += `<span class="dieChip">${roll}</span>`;
					resultStr += `${roll}, `;
				}
				display.innerHTML = html;
				const total = sum+mod;
				let logStr = '';
				if (name) {
					logStr = name + ' ';
				}
				logStr += `(${count}d${sides}): ${sum} `;
				if (mod === 0) {
					totalDisplay.innerHTML = `Total: ${total}`;
				} else if (mod > 0) {
					logStr += `+${mod} = ${total}`;
					totalDisplay.innerHTML = `Total: ${sum} +${mod} = ${total}`;
				} else {
					logStr += `${mod} = ${total}`;
					totalDisplay.innerHTML = `Total: ${sum} ${mod} = ${total}`;
				}
				logStr += ` : [${resultStr.slice(0, -2)}]`;
				addHistoryEntry(logStr)
				playSound();
			}

			function doOdds(die, odds) {
				let i = 0;
				for (;i<odds.length;i++) {
					if (die <= odds[i]) {
						break;
					}
				}
				return i;
			}

			function runOdds(table, odds, sides, description, table2, mod=0, d66=false) {
				let die = Math.floor(Math.random() * sides)+mod;
				const i = doOdds(die, odds);
				display.innerHTML = table[i];
				let log = `${description}: ${table[i]}`;
				if (table2 !== undefined) {
					totalDisplay.innerHTML = table2[i];
					log += `: ${table2[i]}`;
				} else {

					log += ` [${d66n}]`;
					display.innerHTML += ` [${d66n}]`;
				} else {

			function parseDice(str) {
				const dIndex = str.indexOf('d');
				const x = parseInt(str, 10);
				const tail = str.slice(dIndex + 1);
				const modIndex = Math.max(tail.indexOf('+'), tail.indexOf('-'));
				if (modIndex === -1) {
					return [ x, parseInt(tail, 10), 0 ];
				} else {
					const y = parseInt(tail, 10);
					const z = parseInt(tail.slice(modIndex), 10);
					return [ x, y, z ];
				}
			}

					dieStr += z;
				}
				if (name !== '') {

				removeBtn.className = 'customRemove';
				removeBtn.innerHTML = '✕';

				removeBtn.addEventListener('click', () => {
					wrapper.remove();
				});

				wrapper.appendChild(rollBtn);
				wrapper.appendChild(removeBtn);
				return wrapper;
			}

						runTwo(MS_PANIC, MS_PANIC_DESC, 'Panic');
						break;
					case 'msDeath':
						runOdds(MS_DEATH, MS_DEATH_ODDS, 10, 'Death', MS_DEATH_SUB);
						break;
					case 'msLocation':
						runOne(MS_LOCATION, 'Location');
						break;
					case 'msPlanet':
						runTwo(MS_PLANET, MS_PLANET_SUB, 'Planet', 0);
						break;
					case 'msPopulation':
						runOdds(MS_POPULATION, MS_POPULATION_ODDS, 10, 'Location');
						break;
					case 'msPort':
						runOdds(MS_PORT, MS_PORT_ODDS, 10, 'Port Class');
						break;
					case 'msControl':
						runOdds(MS_CONTROL, MS_CONTROL_ODDS, 10, 'Control Faction');
						break;
					case 'msSettlementLocale':
						runOdds(MS_SETTLEMENT_LOCALE, MS_SETTLEMENT_LOCALE_ODDS, 100, 'Settlement Locale');
						break;
					case 'msPuzzle':
						runOdds(MS_PUZZLE_TYPE, MS_PUZZLE_ODDS, 100, 'Puzzle', MS_PUZZLE_DESC);
						break;
					case 'msFaction':
						runOdds(MS_FACTIONS, MS_FACTIONS_ODDS, 100, 'Faction');
						break;
					case 'msLore':
						runOdds(MS_LORE, MS_LORE_ODDS, 100, 'Lore');
						break;
					case 'msContract':
						runOdds(MS_CONTRACT, MS_CONTRACT_ODDS, 10, 'Contract', MS_CONTRACT_DESC);
						break;
					case 'msSettlement':
						runOdds3(MS_SETTLEMENT_TYPE, MS_SETTLEMENT_ODDS, 100, 'Settlement', 'Condition', 'Weird', MS_SETTLEMENT_CONDITION, MS_SETTLEMENT_WEIRD);
						break;
				}
			});

			document.getElementById('addCustomBtn').addEventListener('click', () => {
				let name = diceNameInput.value.trim();
				let x = parseInt(diceCountInput.value, 10);
				let y = parseInt(diceSidesInput.value, 10);
				let z = parseInt(diceModInput.value, 10);

				if (isNaN(x) || x < 1) x = 1;
				if (isNaN(y) || y < 2) y = 6;
				if (isNaN(z)) z = 0;
				diceCountInput.value = x;
				diceSidesInput.value = y;
				diceModInput.value = z;

				const customBtn = createCustomButton(x, y, z, name);
				dicePanel.appendChild(customBtn);
			});
		})();
	</script>
</body>
</html>
