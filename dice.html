<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>🎲 dice</title>
	<style>
		* {
			box-sizing: border-box;
			font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
		}
		body {
			background: linear-gradient(145deg, #0b0f11 0%, #141e0d 100%);
			min-height: 100vh;
			margin: 0;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 0.5rem;
		}
		.card {
			background: rgb(28, 37, 41);
			border-radius: 2rem;
			box-shadow: 0 25px 40px -10px #08222b, inset 0 0 0 1px #f0e0c0;
			padding: 0.5rem 0.5rem;
			text-align: center;
			max-width: min(calc(100vw - 1rem), 40rem);
			min-width: min(calc(100vw - 1rem), 40rem);
			min-height: 100vh;
		}

		.diceBtn {
			background: #fcf5e6;
			box-shadow: 0 5px 0 #6b5a48, 0 8px 15px -8px #1d3f47;
			font-size: 1.4rem;
			font-weight: 600;
			padding: 0.7rem 1rem;
			border-radius: 50px;
			color: #2d2216;
			cursor: pointer;
			transition: all 0.08s linear;
			line-height: 1;
			border: 1px solid #dcc29e;
			transform: translateY(0);
			margin: 0.25rem;
		}
		.diceBtn:hover {
			background: #ffffff;
			box-shadow: 0 3px 0 #5f4f3c, 0 12px 18px -10px #123038;
			transform: translateY(2px);
		}
		.diceBtn:active {
			transform: translateY(5px);
			box-shadow: 0 0 0 #5f4f3c, 0 12px 18px -10px #0e2a31;
			background: #f2e2ce;
		}

		.custom-wrapper {
			display: inline-flex;
			align-items: center;
			gap: 0.3rem;
			background: transparent;
		}

		.custom-remove {
			background: #ac3e3e;
			border: none;
			color: white;
			font-weight: bold;
			font-size: 1.2rem;
			width: 2rem;
			height: 2rem;
			border-radius: 50%;
			display: inline-flex;
			align-items: center;
			justify-content: center;
			cursor: pointer;
			box-shadow: 0 3px 0 #612828;
			transition: 0.05s linear;
			border: 1px solid #d18a8a;
			transform: translateY(0);
		}
		.custom-remove:hover {
			background: #bc4f4f;
			box-shadow: 0 2px 0 #612828;
			transform: translateY(1px);
		}
		.custom-remove:active {
			transform: translateY(3px);
			box-shadow: none;
		}

		.customPanel {
			background: #beb7a2a0;
			border-radius: 4rem;
			padding: 1rem 1rem;
			margin: 1rem 0rem 0rem;
			display: flex;
			flex-wrap: wrap;
			align-items: center;
			justify-content: center;
			gap: 0.8rem 1.2rem;
			border: 1px solid #ddd0b5;
		}
		.customPanel input {
			width: 70px;
			padding: 0.5rem;
			border-radius: 40px;
			border: 1px solid #a48f72;
			background: #fffef7;
			font-size: 1.1rem;
			text-align: center;
			font-weight: 600;
		}
		.add-btn {
			background: #3d7078;
			border: none;
			color: white;
			font-weight: bold;
			padding: 0.5rem 0.8rem;
			border-radius: 40px;
			font-size: 1.1rem;
			cursor: pointer;
			box-shadow: 0 4px 0 #1d4045;
			transition: 0.05s linear;
			border: 1px solid #8fc5cf;
		}
		.add-btn:active {
			transform: translateY(4px);
			box-shadow: none;
		}

		.resultBox {
			background-image: radial-gradient(circle at 30% 20%, #2f6868, #0f3138);
			border-radius: 1rem;
			padding: 0.5rem;
			margin: 0.5rem 0;
			border: 3px solid #dbb48b;
			box-shadow: inset 0 0 15px #0d2429, 0 12px 18px -8px #18353b;
		}
		#diceDisplay {
			align-items: center;
			font-size: 2.5rem;
			font-weight: 600;
			color: #fbeab3;
			text-shadow: 0 0 6px #ffcf8a, 1px 2px 0 #5f492e;
			display: flex;
			flex-wrap: wrap;
			justify-content: center;
		}
		.dieChip {
			background: #fcf3e1;
			color: #281e0f;
			border-radius: 80px;
			font-size: 2.5rem;
			font-weight: 600;
			box-shadow: inset 0 -3px 0 #b29670, 0 5px 0 #3f321f;
			border: 1px solid #e6c394;
			line-height: 1.4;
			min-width: 3.5rem;
			text-align: center;
			margin: 0.25rem;
		}
		#totalDisplay {
			margin-top: 0.5rem;
			font-size: 1.5rem;
			font-weight: 600;
			color: #ffecb3;
			background: #1f4a4a;
			display: inline-block;
			padding: 0.3rem 0.5rem;
			border-radius: 1rem;
			border: 2px solid #dbb48b;
			box-shadow: inset 0 2px 5px #0c2f2f;
		}

		.history-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin: 0.5rem 0 1rem;
		}
		.history-header h2 {
			margin: 0;
			font-size: 1.6rem;
			color: #d6c29b;
			text-shadow: 2px 2px 0 #2f5a5a;
			font-weight: 500;
		}
		.clear-history {
			background: #7a6a53;
			border: none;
			color: #ffeecd;
			padding: 0.35rem 1.5rem;
			border-radius: 50px;
			font-weight: 600;
			cursor: pointer;
			box-shadow: 0 3px 0 #4f4232;
			transition: 0.05s linear;
			font-size: 1rem;
		}
		.clear-history:active {
			transform: translateY(3px);
			box-shadow: none;
		}
		#historyList {
			background: #322f28d0;
			border-radius: 0.5rem;
			max-height: 200px;
			overflow-y: auto;
			text-align: left;
			color: #eddbbd;
			font-size: 1rem;
			border: 2px solid #b7a27b;
			scroll-behavior: smooth;
		}
		.logEntry {
			font-family: monospace;
		}

		.tarot_or {
			font-size: 1.5rem;
			padding: 0 0.25rem;
		}

		.panel { display: none; }
		.panel.active { display: block; }
		button.active {
			background-color: #333;
			color: white;
		}
	</style>
</head>

			const masterAudio = new Audio('data_dice/dice.mp3');
			masterAudio.preload = 'auto';

			const display = document.getElementById('diceDisplay');
			const totalDisplay = document.getElementById('totalDisplay');
			const historyList = document.getElementById('historyList');
			const clearHistoryBtn = document.getElementById('clearHistoryBtn');
			const addCustomBtn = document.getElementById('addCustomBtn');
			const diceCountInput = document.getElementById('diceCount');
			const diceSidesInput = document.getElementById('diceSides');
			const diceModInput = document.getElementById('diceMod');
			const dicePanel = document.getElementById('dicePanel');

			function playSound() {
				try {
					const sound = masterAudio.cloneNode(true);
					sound.volume = 1.0;
					sound.play().catch(err => {
						console.debug('audio play issue (non‑blocking):', err);
					});
				} catch (e) {
					console.debug('audio cloning failed', e);
				}
			}

			function addHistoryEntry(text) {
				const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
				const entryText = `[${timestamp}] ${text}`;

				const entryDiv = document.createElement('div');
				entryDiv.className = 'logEntry';
				entryDiv.textContent = entryText;
				historyList.prepend(entryDiv);
				historyList.scrollTop = 0;
			}

			function performRoll(count, sides, mod=0) {
				let sum = 0;
				let html = '';
				let resultStr = '';
				for (let i = 0; i < count; i++) {
					const roll = Math.floor(Math.random() * sides) + 1;
					sum += roll;
					html += `<span class="dieChip">${roll}</span>`;
					resultStr += `${roll}, `;
				}
				display.innerHTML = html;
				const total = sum+mod;
				let logStr = `${count}d${sides}: ${sum} `;
				if (mod === 0) {
					totalDisplay.innerHTML = `Total: ${total}`;
				} else if (mod > 0) {
					logStr += `+${mod} = ${total}`;
					totalDisplay.innerHTML = `Total: ${sum} +${mod} = ${total}`;
				} else {
					logStr += `${mod} = ${total}`;
					totalDisplay.innerHTML = `Total: ${sum} ${mod} = ${total}`;
				}
				logStr += ` : [${resultStr.slice(0, -2)}]`;
				addHistoryEntry(logStr)
				playSound();
			}

			function performOracle() {
				const die = Math.floor(Math.random() * 6)
				const result = ORACLE_TABLE[die];
				const result_sub = ORACLE_TABLE_SUB[die][Math.floor(Math.random() * 6)];
				display.innerHTML = result;
				totalDisplay.innerHTML = result_sub;
				const log = `${result} : ${result_sub}`;
				addHistoryEntry(log);
				playSound();
			}

			function performTarot() {
				const die = Math.floor(Math.random() * 22)
				const orientation = Math.floor(Math.random() * 2)
				const result = TAROT_TABLE[die];
				const result_sub = TAROT_MEANING[die][orientation];
				display.innerHTML = `${result}<span class="tarot_or">(${TAROT_ORIENTATION[orientation]})</span>`;
				totalDisplay.innerHTML = result_sub;
				addHistoryEntry(`${result} (${TAROT_ORIENTATION[orientation]}) : ${result_sub}`);
				playSound();
			}
			function performSemiotic() {
				const die = Math.floor(Math.random() * SEMIOTIC_STANDARD.length)
				display.innerHTML = SEMIOTIC_STANDARD[die];
				totalDisplay.innerHTML = SEMIOTIC_STANDARD_SUB[die];
				addHistoryEntry(`${SEMIOTIC_STANDARD[die]} : ${SEMIOTIC_STANDARD_SUB[die]}`);
				playSound();
			}
			function performGME(table, name) {
				const die = Math.floor(Math.random() * table.length)
				display.innerHTML = table[die];
				totalDisplay.innerHTML = name;
				addHistoryEntry(`${name}: ${table[die]}`);
				playSound();
			}
			function performGME2(table1, table2) {
				const die1 = Math.floor(Math.random() * table1.length)
				const die2 = Math.floor(Math.random() * table2.length)
				display.innerHTML = table1[die1];
				totalDisplay.innerHTML = table2[die2];
				addHistoryEntry(`${table1[die1]} : ${table2[die2]}`);
				playSound();
			}
			function parseDice(str) {
				const dIndex = str.indexOf('d');
				const x = parseInt(str, 10);
				const tail = str.slice(dIndex + 1);
				const modIndex = Math.max(tail.indexOf('+'), tail.indexOf('-'));
				if (modIndex === -1) {
					return [ x, parseInt(tail, 10), 0 ];
				} else {
					const y = parseInt(tail, 10);
					const z = parseInt(tail.slice(modIndex), 10);
					return [ x, y, z ];
				}
			}

			document.getElementById('tabPanel').addEventListener('click', (e) => {
				const btn = e.target.closest('button');
				if (!btn) {
					return;
				}
				document.querySelectorAll('#tabPanel button, .panel').forEach(el => {
					el.classList.remove('active');
				});
				btn.classList.add('active');
				document.getElementById(btn.dataset.target).classList.add('active');
			});

			document.getElementById('dicePanel').addEventListener('click', (e) => {
				const btn = e.target.closest('button');
				if (!btn || !btn.dataset.roll) {
					return;
				}
				const roll = parseDice(btn.dataset.roll);
				performRoll(roll[0], roll[1], roll[2]);
			});

			document.getElementById('oraclePanel').addEventListener('click', (e) => {
				const btn = e.target.closest('button');
				if (!btn) {
					return;
				}
				switch (btn.id) {
					case 'rollTarot':
						performTarot();
						break;
					case 'rollOracle':
						performOracle();
						break;
					case 'rollSemiotic':
						performSemiotic();
						break;
					case 'gmeAction1':
						performGME(GME_ACTION1, 'Action 1');
						break;
					case 'gmeAction2':
						performGME(GME_ACTION2, 'Action 2');
						break;
					case 'gmeChar':
						performGME(GME_CHAR, 'Character');
						break;
					case 'gmeCharAppearance':
						performGME(GME_CHAR_APPEARANCE, 'Character Appearance');
						break;
					case 'gmeDesc1':
						performGME(GME_DESC1, 'Description 1');
						break;
					case 'gmeDesc2':
						performGME(GME_DESC2, 'Description 2');
						break;
					case 'gmeLocation':
						performGME(GME_LOCATION, 'Location');
						break;
					case 'gmeObject':
						performGME(GME_OBJECT, 'Object');
						break;
					case 'gmeTone':
						performGME(GME_TONE, 'Tone');
						break;
					default:
						console.log(e);
				}
			});

			function createCustomButton(x, y, z) {
				const wrapper = document.createElement('div');
				wrapper.className = 'custom-wrapper';

				const rollBtn = document.createElement('button');
				rollBtn.className = 'diceBtn';
				let dieStr = `${x}d${y}`;
				if (z > 0) {
					dieStr += '+' + z;
				} else if (z < 0) {
					dieStr += z;
				}
				rollBtn.textContent = dieStr;
				rollBtn.dataset.roll = dieStr;

				const removeBtn = document.createElement('button');
				removeBtn.className = 'custom-remove';
				removeBtn.innerHTML = '✕';

				removeBtn.addEventListener('click', () => {
					wrapper.remove();
				});

				wrapper.appendChild(rollBtn);
				wrapper.appendChild(removeBtn);
				return wrapper;
			}

			addCustomBtn.addEventListener('click', () => {
				let x = parseInt(diceCountInput.value, 10);
				let y = parseInt(diceSidesInput.value, 10);
				let z = parseInt(diceModInput.value, 10);

				if (isNaN(x) || x < 1) x = 1;
				if (isNaN(y) || y < 2) y = 6;
				if (isNaN(z)) z = 0;
				diceCountInput.value = x;
				diceSidesInput.value = y;
				diceModInput.value = z;

				const customBtn = createCustomButton(x, y, z);
				dicePanel.appendChild(customBtn);
			});
		})();
	</script>
