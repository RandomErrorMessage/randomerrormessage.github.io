<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>🎲 dice</title>
	<style>
		* {
			box-sizing: border-box;
			font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
		}
		body {
			background: linear-gradient(145deg, #0b0f11 0%, #141e0d 100%);
			min-height: 100vh;
			margin: 0;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 0.8rem;
		}
		.card {
			background: rgb(28, 37, 41);
			border-radius: 2.5rem;
			box-shadow: 0 25px 40px -10px #08222b, inset 0 0 0 1px #f0e0c0;
			padding: 0.5rem 0.5rem;
			text-align: center;
			max-width: min(calc(100vw - 1.6rem), 40rem);
			min-height: 100vh;
		}
		.fixed-panel {
			display: flex;
			flex-wrap: wrap;
			justify-content: center;
			gap: 0.8rem;
			margin: 0.8rem;
		}
		.dice-btn {
			background: #fcf5e6;
			box-shadow: 0 5px 0 #6b5a48, 0 8px 15px -8px #1d3f47;
			font-size: 1.4rem;
			font-weight: 600;
			padding: 0.7rem 1rem;
			border-radius: 50px;
			color: #2d2216;
			cursor: pointer;
			transition: all 0.08s linear;
			line-height: 1;
			border: 1px solid #dcc29e;
			transform: translateY(0);
		}
		.dice-btn:hover {
			background: #ffffff;
			box-shadow: 0 3px 0 #5f4f3c, 0 12px 18px -10px #123038;
			transform: translateY(2px);
		}
		.dice-btn:active {
			transform: translateY(5px);
			box-shadow: 0 0 0 #5f4f3c, 0 12px 18px -10px #0e2a31;
			background: #f2e2ce;
		}

		.custom-wrapper {
			display: inline-flex;
			align-items: center;
			gap: 0.3rem;
			background: transparent;
		}

		.custom-remove {
			background: #ac3e3e;
			border: none;
			color: white;
			font-weight: bold;
			font-size: 1.2rem;
			width: 2rem;
			height: 2rem;
			border-radius: 50%;
			display: inline-flex;
			align-items: center;
			justify-content: center;
			cursor: pointer;
			box-shadow: 0 3px 0 #612828;
			transition: 0.05s linear;
			border: 1px solid #d18a8a;
			transform: translateY(0);
		}
		.custom-remove:hover {
			background: #bc4f4f;
			box-shadow: 0 2px 0 #612828;
			transform: translateY(1px);
		}
		.custom-remove:active {
			transform: translateY(3px);
			box-shadow: none;
		}

		.custom-creator {
			background: #beb7a2a0;
			border-radius: 4rem;
			padding: 1rem 1rem;
			margin: 1rem 0rem 0rem;
			display: flex;
			flex-wrap: wrap;
			align-items: center;
			justify-content: center;
			gap: 0.8rem 1.2rem;
			border: 1px solid #ddd0b5;
		}
		.custom-creator input {
			width: 70px;
			padding: 0.5rem;
			border-radius: 40px;
			border: 1px solid #a48f72;
			background: #fffef7;
			font-size: 1.1rem;
			text-align: center;
			font-weight: 600;
		}
		.add-btn {
			background: #3d7078;
			border: none;
			color: white;
			font-weight: bold;
			padding: 0.5rem 0.8rem;
			border-radius: 40px;
			font-size: 1.1rem;
			cursor: pointer;
			box-shadow: 0 4px 0 #1d4045;
			transition: 0.05s linear;
			border: 1px solid #8fc5cf;
		}
		.add-btn:active {
			transform: translateY(4px);
			box-shadow: none;
		}

		.result-box {
			background-image: radial-gradient(circle at 30% 20%, #2f6868, #0f3138);
			border-radius: 1rem;
			padding: 0.5rem 0.5rem;
			margin: 0.5rem;
			border: 3px solid #dbb48b;
			box-shadow: inset 0 0 15px #0d2429, 0 12px 18px -8px #18353b;
		}
		#diceDisplay {
			min-height: 4rem;
			font-size: 2.5rem;
			font-weight: 600;
			color: #fbeab3;
			text-shadow: 0 0 6px #ffcf8a, 1px 2px 0 #5f492e;
			display: flex;
			flex-wrap: wrap;
			align-items: center;
			justify-content: center;
		}
		.die-chip {
			background: #fcf3e1;
			color: #281e0f;
			border-radius: 80px;
			font-size: 2.5rem;
			font-weight: 600;
			box-shadow: inset 0 -3px 0 #b29670, 0 5px 0 #3f321f;
			border: 1px solid #e6c394;
			line-height: 1.4;
			min-width: 3.5rem;
			text-align: center;
			margin: 0.25rem;
		}
		#totalDisplay {
			font-size: 1.5rem;
			font-weight: 600;
			color: #ffecb3;
			background: #1f4a4a;
			display: inline-block;
			padding: 0.3rem 0.5rem;
			border-radius: 1rem;
			margin-top: 0.8rem;
			border: 2px solid #dbb48b;
			box-shadow: inset 0 2px 5px #0c2f2f;
		}

		.history-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin: 0.5rem 0 1rem;
		}
		.history-header h2 {
			margin: 0;
			font-size: 1.6rem;
			color: #d6c29b;
			text-shadow: 2px 2px 0 #2f5a5a;
			font-weight: 500;
		}
		.clear-history {
			background: #7a6a53;
			border: none;
			color: #ffeecd;
			padding: 0.35rem 1.5rem;
			border-radius: 50px;
			font-weight: 600;
			cursor: pointer;
			box-shadow: 0 3px 0 #4f4232;
			transition: 0.05s linear;
			font-size: 1rem;
		}
		.clear-history:active {
			transform: translateY(3px);
			box-shadow: none;
		}
		#historyList {
			background: #322f28d0;
			border-radius: 2rem;
			padding: 1rem 1.2rem;
			max-height: 200px;
			overflow-y: auto;
			text-align: left;
			color: #eddbbd;
			font-size: 1rem;
			border: 2px solid #b7a27b;
			scroll-behavior: smooth;
		}
		.history-entry {
			font-family: monospace;
		}

		.tarot_or {
			font-size: 1.5rem;
			padding: 0 0.25rem;
		}
	</style>
</head>
<body>
	<div class="card">
		<div class="fixed-panel" id="custom-buttons">
			<button class="dice-btn" id="roll1d6">⚀ 1d6</button>
			<button class="dice-btn" id="roll2d6">⚁ 2d6</button>
			<button class="dice-btn" id="roll3d6">⚂ 3d6</button>
			<button class="dice-btn" id="roll4d6">⚃ 4d6</button>
			<button class="dice-btn" id="roll1d3">🪨 1d3</button>
			<button class="dice-btn" id="roll1d4">🔪 1d4</button>
			<button class="dice-btn" id="roll1d6e">🗡️ 1d6</button>
			<button class="dice-btn" id="roll1d8">🎱 1d8</button>
			<button class="dice-btn" id="roll1d10">🔟 1d10</button>
			<button class="dice-btn" id="roll1d12">🪓 1d12</button>
			<button class="dice-btn" id="roll1d20">👑 1d20</button>
			<button class="dice-btn" id="roll1d100">💯 1d100</button>
			<button class="dice-btn" id="rollOracle">🔮 Oracle</button>
			<button class="dice-btn" id="rollTarot">✨ Tarot</button>
			<button class="dice-btn" id="rollSemiotic">👁️ Semiotic</button>
		</div>

		<div class="result-box">
			<div id="diceDisplay">—</div>
			<div id="totalDisplay"></div>
		</div>

		<div id="historyList"></div>

		<div class="history-header">
			<h2>📋 history</h2>
			<button class="clear-history" id="clearHistoryBtn">clear log</button>
		</div>

		<div class="custom-creator">
			<input type="number" id="diceCount" min="1" value="2" step="1">
			<input type="number" id="diceSides" min="2" value="8" step="1">
			<button class="add-btn" id="addCustomBtn">➕ Add XdY</button>
		</div>
	</div>

	<script>
		(function() {
			const ORACLE_TABLE = ["No, and...", "No.", "No, but...", "Yes, but...", "Yes.", "Yes, and..."]
			const ORACLE_TABLE_SUB = [
["Void", "Treason", "Chaos", "Pain", "Corruption", "Oppression"],
["Suspicion", "Regression", "Collision", "Desire", "Vengeance", "Occult"],
["Survival", "Sacrifice", "Conflict", "Control", "Electricity", "Subversion"],
["Nurturing", "Light", "Noise", "Healing", "Velocity", "Freedom"],
["Compromise", "Prophecy", "Guidance", "Growth", "Evolution", "Nature"],
["Balance", "Wealth", "Change", "Order", "Truth", "Time"]
]
			const TAROT_TABLE = [
"The Fool",
"The Magician",
"The High Priestess",
"The Empress",
"The Emperor",
"The Hierophant",
"The Lovers",
"The Chariot",
"Strength",
"The Hermit",
"The Wheel of Fortune",
"Justice",
"The Hanged Man",
"Death",
"Temperance",
"The Devil",
"The Blasted Tower",
"The Star",
"The Moon",
"The Sun",
"Judgement",
"The Universe"
]
			const TAROT_ORIENTATION = ["Upright", "Reversed"]
			const TAROT_MEANING = [
["Innocence, new beginnings, free spirit", "Recklessness, naivety, foolishness"],
["Manifestation, resourcefulness, power, willpower, skill", "Trickery, poor planning, untapped talents, illusion"],
["Willpower, desire, creation, manifestation", "Trickery, illusions, out of touch"],
["Femininity, beauty, nature, nurturing, abundance, fertility, sensuality", "Creative block, dependence on others, emptiness, lack of growth"],
["Authority, structure, control, fatherhood, leadership, stability, discipline", "Domination, excessive control, rigidity, stubbornness, tyranny"],
["Tradition, conventionality, conformity, education, knowledge, beliefs", "Rebellion, unconventionality, non-conformity, ignorance"],
["Love, harmony, relationships, values alignment, choices, union", "Disharmony, imbalance, misalignment, values conflict"],
["Success, ambition, determination, willpower, control, focus", "Forceful, no direction, no control, powerless, aggression, obstacles"],
["Strength, courage, persuasion, influence, compassion, inner fortitude", "Inner weakness, self-doubt, low energy, insecurity, raw emotion"],
["Introspection, solitude, inner guidance, wisdom, withdrawal", "Isolation, loneliness, reclusiveness, withdrawal from the world"],
["Good luck, karma, life cycles, destiny, turning point, fortune, fate", "Bad luck, resistance to change, breaking cycles, setbacks, ill fortune"],
["Justice, fairness, truth, cause and effect, law, accountability", "Unfairness, dishonesty, corruption, avoiding accountability, bias"],
["New perspectives, surrender, sacrifice, suspension, enlightenment", "Apathy, indecision, delay, resistance to sacrifice"],
["Endings, transformation, transition, letting go", "Resistance to change, stagnation, decay, clinging to the past"],
["Balance, moderation, patience, purpose, harmony, meaning, blending", "Imbalance, excess, hastiness, overindulgence"],
["Shadow self, attachment, addiction, restriction, materialism, bondage", "Detachment, liberation, releasing addiction, freedom, independence"],
["Sudden change, upheaval, chaos, revelation, awakening, breakdown", "Fear of change, disaster averted, delay"],
["Hope, inspiration, positivity, faith, renewal, healing, rejuvenation", "Hopelessness, despair, negativity, lack of faith, despondent"],
["Illusion, fear, anxiety, subconscious, intuition, dreams, the unknown", "Release of fear, repressed emotion, inner confusion, clarity"],
["Positivity, warmth, success, vitality, joy, confidence", "Sadness, ego inflation, overexposure, unrealistic expectations, depression"],
["Judgement, rebirth, inner calling, absolution, self-evaluation, awakening", "Self-doubt, lack of self-awareness, self-loathing"],
["Completion, integration, accomplishment, travel, wholeness, fulfillment", "Incompletion, lack of closure, emptiness, shortcuts, delays"]
]
			const SEMIOTIC_STANDARD = [
"Flooding Water",
"Magnet",
"Intercom",
"Airlock",
"Tight Gap",
"Slip Hazard",
"Explosion Risk",
"Laser",
"Interference",
"Compression",
"Radiation",
"Low Gravity",
"Living Quarters",
"Firearms",
"Foodstuff",
"Wildlife",
"Low Temperature",
"High Voltage",
"Steep",
"Alien Forms",
"Breach",
"Moving Machinery",
"Uneven Surface",
"High Activity",
"Classified Material",
"Corrosive",
"Hazardous Material",
"Restricted Area",
"Noise",
"Debris",
"Biological Hazard",
"Gas Storage",
"Organic Matter",
"Refrigeration",
"Simulated Reality",
"Cryogenic Chamber",
"Storage",
"Medical Support",
"Navigation System",
"Artificial Intelligence",
"Broadcast System",
"Spillage",
"Computer Terminal",
"Containment",
"Hazmat Suit",
"Video Surveillance",
"High Gravity",
"Adverse Weather",
"Ultraviolet",
"Infrared"
]
				SEMIOTIC_STANDARD_SUB = [
"Water/Weakness",
"Attraction/Bond",
"Volume/Distance",
"Breath/Security",
"Possibility/Proximity",
"Uncertainty/Motion",
"Deconstruction/Volatility",
"Light/Fire",
"Confusion/Obscurity",
"Pressure/Size",
"Time/Sickness",
"Weight/Unreality",
"Sleep/Interaction",
"Violence/Suppression",
"Digestion/Necessity",
"Nature/Unknown",
"Survival/Slowness",
"Shock/Deception",
"Suddenness/Change",
"Unfamiliarity/Novelty",
"Surprise/Compromise",
"Industry/Repetition",
"Imbalance/Imperfection",
"Civilisation/Labour",
"Secret/Protection",
"Consumption/Decay",
"Alert/Temptation",
"Authority/Access",
"Distraction/Attrition",
"Material/Carelessness",
"Spoilage/Transference",
"Responsibility/Risk",
"Fragility/Emergence",
"Measurement/Care",
"Illusion/Replacement",
"Stasis/Cessation",
"Reliability/Utility",
"Health/Sterility",
"Direction/Guidance",
"Logic/Miscommunication",
"Communication/Bond",
"Negligence/Leakage",
"System/Access",
"Entrapment/Procedure",
"Emergency/Contamination",
"Scrutiny/Evidence",
"Restriction/Burden",
"Preparation/Intervention",
"Growth/Cleansing",
"Obscurity/Color"
]

			const masterAudio = new Audio('data_dice/dice.mp3');
			masterAudio.preload = 'auto';

			const display = document.getElementById('diceDisplay');
			const totalDisplay = document.getElementById('totalDisplay');
			const historyList = document.getElementById('historyList');
			const clearHistoryBtn = document.getElementById('clearHistoryBtn');
			const addCustomBtn = document.getElementById('addCustomBtn');
			const diceCountInput = document.getElementById('diceCount');
			const diceSidesInput = document.getElementById('diceSides');
			const customContainer = document.getElementById('custom-buttons');

			function playSound() {
				try {
					const sound = masterAudio.cloneNode(true);
					sound.volume = 1.0;
					sound.play().catch(err => {
						console.debug('audio play issue (non‑blocking):', err);
					});
				} catch (e) {
					console.debug('audio cloning failed', e);
				}
			}

			function addHistoryEntry(text) {
				const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
				const entryText = `[${timestamp}] ${text}`;

				const entryDiv = document.createElement('div');
				entryDiv.className = 'history-entry';
				entryDiv.textContent = entryText;
				historyList.prepend(entryDiv);
				historyList.scrollTop = 0;
			}

			function performRoll(count, sides, description) {
				const results = [];
				for (let i = 0; i < count; i++) {
					results.push(Math.floor(Math.random() * sides) + 1);
				}
				const sum = results.reduce((acc, val) => acc + val, 0);
				let html = '';
				for (let i = 0; i < results.length; i++) {
					html += `<span class="die-chip">${results[i]}</span>`;
				}
				display.innerHTML = html;
				totalDisplay.innerHTML = `Total: ${sum}`;
				const resultStr = results.join(', ');
				const entryText = `${description} : [${resultStr}]  (sum ${sum})`;
				addHistoryEntry(entryText)
				playSound();
			}

			function performOracle() {
				const die = Math.floor(Math.random() * 6)
				const result = ORACLE_TABLE[die];
				const result_sub = ORACLE_TABLE_SUB[die][Math.floor(Math.random() * 6)];
				display.innerHTML = result;
				totalDisplay.innerHTML = result_sub;
				const log = `${result} : ${result_sub}`;
				addHistoryEntry(log);
				playSound();
			}

			function performTarot() {
				const die = Math.floor(Math.random() * 22)
				const orientation = Math.floor(Math.random() * 2)
				const result = TAROT_TABLE[die];
				const result_sub = TAROT_MEANING[die][orientation];
				display.innerHTML = `${result}<span class="tarot_or">(${TAROT_ORIENTATION[orientation]})</span>`;
				totalDisplay.innerHTML = result_sub;
				addHistoryEntry(`${result} (${TAROT_ORIENTATION[orientation]}) : ${result_sub}`);
				playSound();
			}
			function performSemiotic() {
				const die = Math.floor(Math.random() * SEMIOTIC_STANDARD.length)
				display.innerHTML = SEMIOTIC_STANDARD[die];
				totalDisplay.innerHTML = SEMIOTIC_STANDARD_SUB[die];
				const log = `${SEMIOTIC_STANDARD[die]} : ${SEMIOTIC_STANDARD_SUB[die]}`;
				addHistoryEntry(log);
				playSound();
			}

			document.getElementById('roll1d3').addEventListener('click', () => {
				performRoll(1, 3, '1d3');
			});
			document.getElementById('roll1d4').addEventListener('click', () => {
				performRoll(1, 4, '1d4');
			});
			document.getElementById('roll1d6').addEventListener('click', () => {
				performRoll(1, 6, '1d6');
			});
			document.getElementById('roll1d6e').addEventListener('click', () => {
				performRoll(1, 6, '1d6');
			});
			document.getElementById('roll2d6').addEventListener('click', () => {
				performRoll(2, 6, '2d6');
			});
			document.getElementById('roll3d6').addEventListener('click', () => {
				performRoll(3, 6, '3d6');
			});
			document.getElementById('roll4d6').addEventListener('click', () => {
				performRoll(4, 6, '4d6');
			});
			document.getElementById('roll1d8').addEventListener('click', () => {
				performRoll(1, 8, '1d8');
			});
			document.getElementById('roll1d10').addEventListener('click', () => {
				performRoll(1, 10, '1d10');
			});
			document.getElementById('roll1d12').addEventListener('click', () => {
				performRoll(1, 12, '1d12');
			});
			document.getElementById('roll1d20').addEventListener('click', () => {
				performRoll(1, 20, '1d20');
			});
			document.getElementById('roll1d100').addEventListener('click', () => {
				performRoll(1, 100, '1d100');
			});
			document.getElementById('rollOracle').addEventListener('click', () => {
				performOracle();
			});
			document.getElementById('rollTarot').addEventListener('click', () => {
				performTarot();
			});
			document.getElementById('rollSemiotic').addEventListener('click', () => {
				performSemiotic();
			});

			function createCustomButton(x, y) {
				const wrapper = document.createElement('div');
				wrapper.className = 'custom-wrapper';

				const rollBtn = document.createElement('button');
				rollBtn.className = 'dice-btn';  // styled like dice-btn
				rollBtn.textContent = `${x}d${y}`;
				rollBtn.setAttribute('aria-label', `roll ${x}d${y}`);

				rollBtn.addEventListener('click', () => {
					performRoll(x, y, `${x}d${y}`);
				});

				const removeBtn = document.createElement('button');
				removeBtn.className = 'custom-remove';
				removeBtn.innerHTML = '✕';
				removeBtn.setAttribute('aria-label', `remove ${x}d${y}`);

				removeBtn.addEventListener('click', () => {
					wrapper.remove();
				});

				wrapper.appendChild(rollBtn);
				wrapper.appendChild(removeBtn);
				return wrapper;
			}

			addCustomBtn.addEventListener('click', () => {
				let x = parseInt(diceCountInput.value, 10);
				let y = parseInt(diceSidesInput.value, 10);

				// validation
				if (isNaN(x) || x < 1) x = 1;
				if (isNaN(y) || y < 2) y = 6;  // at least d2
				diceCountInput.value = x;
				diceSidesInput.value = y;

				const customBtn = createCustomButton(x, y);
				customContainer.appendChild(customBtn);
			});
		})();
	</script>
</body>
</html>
